name: Build and deploy

on:
  push:
    branches:
      - main

# Only one deploy runs at a time; new pushes cancel in-flight deploys.
concurrency:
  group: deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/laudbot-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/laudbot-frontend

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # Required to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            BACKEND_URL=http://backend
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger DO App Platform deploy
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Trigger deployment
        run: doctl apps create-deployment ${{ secrets.DO_APP_ID }} --force-rebuild
